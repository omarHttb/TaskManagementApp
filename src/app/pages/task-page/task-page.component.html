<div class="container">
  <div class="task-container">
    <div class="top-container-bar">
      <h1>Title: {{ Task.title }}</h1>
      <div class="Action-buttons">
        <input class="edit-button" type="button" value="EDIT" />
        <input class="delete-button" type="button" value="DELETE" />
      </div>
    </div>
    <h3>Description: {{ Task.description }}</h3>
    <h4>Status: {{ Task.statusOptions }}</h4>
    <h4>
      Priority:
      <span
        style="color: black"
        [ngClass]="{
          'badge-danger': Task.priority === 'High',
          'badge-yellow': Task.priority === 'Medium',
          'badge-green': Task.priority === 'Low',
        }"
      >
        {{ Task.priority }}
      </span>
    </h4>
    <h4>Due Date: {{ Task.dueDate | date: "medium" }}</h4>
    <h4>Created At: {{ Task.CreatedAt | date: "medium" }}</h4>
  </div>
</div>
